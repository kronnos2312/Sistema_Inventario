# ─────────────────────────────────────────────────────────────────────────────
# OVERRIDES — Ambiente de desarrollo (dev)
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml \
#              --env-file envs/.env.dev up --build
# ─────────────────────────────────────────────────────────────────────────────
services:

  db:
    # Puerto expuesto para conectar con herramientas externas (DBeaver, pgAdmin)
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    restart: "no"

  app:
    restart: "no"
    environment:
      # SQL completo en consola para facilitar el debugging
      SPRING_JPA_SHOW_SQL: "true"
      LOGGING_LEVEL_ORG_HIBERNATE_SQL: DEBUG
      LOGGING_LEVEL_ORG_HIBERNATE_TYPE_DESCRIPTOR_SQL_BASICBINDER: TRACE
