# ── Perfil PROD ─────────────────────────────────────────────────
# Nunca modifica el esquema automáticamente. El proyecto no usa Flyway ni
# Liquibase, así que cualquier cambio de esquema en producción debe
# aplicarse manualmente o migrando temporalmente a ddl-auto=update.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
logging.level.com.inventory=INFO
