# ── Perfil TESTING ──────────────────────────────────────────────
# Arranca con el esquema recreado desde cero en cada ejecución (create-drop).
# ADVERTENCIA: si este perfil apunta a la misma base de datos que "dev"
# (ver .env.testing), cada arranque/parada de este perfil BORRA el esquema
# y los datos de desarrollo.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
logging.level.com.inventory=DEBUG
