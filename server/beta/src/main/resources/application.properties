spring.application.name=inventory
spring.main.banner-mode=off

# ── Base de datos ─────────────────────────────────────────────
# Los valores se leen de variables de entorno si existen,
# o usan el valor por defecto para desarrollo local.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mydatabase}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:myuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mypassword}

# ── Hibernate / JPA ───────────────────────────────────────────
spring.jpa.properties.hibernate.default_schema=${SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA:sysinventarios}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ── Almacenamiento de archivos ────────────────────────────────
files.storage.dir=${FILES_DIR:/tmp/inventario/files}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ── APK de la app Android (generado por el servicio Docker "android") ─
apk.storage.dir=${APK_DIR:/tmp/inventario/apk}
apk.file.name=${APK_FILE_NAME:sistema-inventario.apk}

# ── Misc ──────────────────────────────────────────────────────
spring.main.allow-bean-definition-overriding=true

# ── Seguridad / JWT ───────────────────────────────────────────
jwt.secret=${JWT_SECRET:change-me-in-prod-please-32-bytes-min}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
admin.default-password=${ADMIN_DEFAULT_PASSWORD:admin123}
