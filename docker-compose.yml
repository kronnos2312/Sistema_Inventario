name: sistema-inventario

networks:
  app-net:
    driver: bridge

volumes:
  pgdata:

services:

  # ── BASE DE DATOS ────────────────────────────────────────────────────────────
  db:
    image: postgres:14
    restart: always
    environment:
      POSTGRES_DB:       ${DB_NAME:-inventory}
      POSTGRES_USER:     ${DB_USER:-myuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mypassword}
      DB_SCHEMA:         ${DB_SCHEMA:-sysinventarios}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init.sh
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── BACKEND (Spring Boot) ────────────────────────────────────────────────────
  backend:
    build:
      context: ./server/beta
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:                          jdbc:postgresql://db:5432/${DB_NAME:-inventory}
      SPRING_DATASOURCE_USERNAME:                     ${DB_USER:-myuser}
      SPRING_DATASOURCE_PASSWORD:                     ${DB_PASSWORD:-mypassword}
      SPRING_JPA_HIBERNATE_DDL_AUTO:                  ${DDL_AUTO:-update}
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: ${DB_SCHEMA:-sysinventarios}
    networks:
      - app-net

  # ── FRONTEND (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./web/beta
      dockerfile: Dockerfile
      args:
        # /api-proxy es relativo: funciona desde cualquier IP sin rebuild.
        # Next.js lo proxía a INTERNAL_API_URL via la red interna de Docker.
        NEXT_PUBLIC_API_BASE_URL: /api-proxy
        NEXT_PUBLIC_LOGO:         ${NEXT_PUBLIC_LOGO:-/logo/logo.png}
        NEXT_PUBLIC_SITE_TITLE:   ${NEXT_PUBLIC_SITE_TITLE:-Sistema Inventario}
        NEXT_PUBLIC_SITE_CLIENT:  ${NEXT_PUBLIC_SITE_CLIENT:-TuZona PC Gamer}
        # Pasado como build arg para que next.config.ts lo lea en el build
        INTERNAL_API_URL:         http://backend:8080
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./logo:/app/public/logo
    depends_on:
      - backend
    environment:
      # URL interna de Docker: Next.js la usa en el servidor para redirigir /api-proxy/*
      INTERNAL_API_URL: http://backend:8080
      # IP real del host para el módulo de configuración / QR
      HOST_IP:   ${HOST_IP:-}
      HOST_PORT: ${FRONTEND_PORT:-3000}
    networks:
      - app-net
