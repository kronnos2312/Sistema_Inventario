version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
#  BASE — Configuración común a todos los ambientes.
#
#  No usar directamente. Combinar siempre con un override de ambiente:
#    docker compose -f docker-compose.yml -f docker-compose.<env>.yml \
#                   --env-file envs/.env.<env> up --build
#
#  Atajo recomendado: make dev | make test | make prod
# ─────────────────────────────────────────────────────────────────────────────

networks:
  app-net:
    driver: bridge

volumes:
  pgdata:

services:

  # ── BASE DE DATOS ────────────────────────────────────────────────────────
  db:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-mydatabase}
      POSTGRES_USER:     ${DB_USER:-myuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mypassword}
      DB_SCHEMA:         ${DB_SCHEMA:-sysinventarios}   # leído por init-db.sh
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init.sh
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── APLICACIÓN (Spring Boot + Next.js en un solo contenedor) ────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
        NEXT_PUBLIC_LOGO:         ${NEXT_PUBLIC_LOGO:-/img/Testing_LOGO.png}
        NEXT_PUBLIC_SITE_TITLE:   ${NEXT_PUBLIC_SITE_TITLE:-TuZonaPCGamer}
        NEXT_PUBLIC_SITE_CLIENT:  ${NEXT_PUBLIC_SITE_CLIENT:-TuZona PC Gamer}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:                          jdbc:postgresql://db:5432/${DB_NAME:-mydatabase}
      SPRING_DATASOURCE_USERNAME:                     ${DB_USER:-myuser}
      SPRING_DATASOURCE_PASSWORD:                     ${DB_PASSWORD:-mypassword}
      SPRING_JPA_HIBERNATE_DDL_AUTO:                  ${DDL_AUTO:-update}
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: ${DB_SCHEMA:-sysinventarios}
    networks:
      - app-net
