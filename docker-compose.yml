version: '3.8'

# Carga variables desde el archivo .env ubicado en la raíz del proyecto.
# Copia .env.example a .env y ajusta los valores antes de ejecutar.

# ──────────────────────────────────────────────────────────────
#  REDES
# ──────────────────────────────────────────────────────────────
networks:
  app-net:
    driver: bridge

# ──────────────────────────────────────────────────────────────
#  VOLÚMENES
# ──────────────────────────────────────────────────────────────
volumes:
  pgdata:

# ──────────────────────────────────────────────────────────────
#  SERVICIOS
# ──────────────────────────────────────────────────────────────
services:

  # ── BASE DE DATOS ────────────────────────────────────────────
  db:
    image: postgres:14
    container_name: tuzonapcgamer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-mydatabase}
      POSTGRES_USER:     ${DB_USER:-myuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mypassword}
      DB_SCHEMA:         ${DB_SCHEMA:-sysinventarios}   # leído por init-db.sh
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init.sh  # crea el schema al iniciar
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── APLICACIÓN (Backend + Frontend en un solo contenedor) ────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
        NEXT_PUBLIC_LOGO:         ${NEXT_PUBLIC_LOGO:-/img/Testing_LOGO.png}
        NEXT_PUBLIC_SITE_TITLE:   ${NEXT_PUBLIC_SITE_TITLE:-TuZonaPCGamer}
        NEXT_PUBLIC_SITE_CLIENT:  ${NEXT_PUBLIC_SITE_CLIENT:-TuZona PC Gamer}
    container_name: tuzonapcgamer-app
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"   # Next.js
      - "${BACKEND_PORT:-8080}:8080"    # Spring Boot
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:                          jdbc:postgresql://db:5432/${DB_NAME:-mydatabase}
      SPRING_DATASOURCE_USERNAME:                     ${DB_USER:-myuser}
      SPRING_DATASOURCE_PASSWORD:                     ${DB_PASSWORD:-mypassword}
      SPRING_JPA_HIBERNATE_DDL_AUTO:                  ${DDL_AUTO:-update}
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: ${DB_SCHEMA:-sysinventarios}
    networks:
      - app-net
